name: Vendor visual dependencies

on:
  schedule:
    - cron: '19 9 * * 1'
  workflow_dispatch:
    inputs:
      d3_version:
        description: Exact D3 npm version (blank uses latest)
        required: false
        type: string
      ideogram_version:
        description: Exact Ideogram npm version (blank uses latest)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org

      - uses: r-lib/actions/setup-r@v2

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::testthat
          needs: check

      - name: Resolve exact versions
        id: versions
        env:
          D3_INPUT: ${{ inputs.d3_version }}
          IDEOGRAM_INPUT: ${{ inputs.ideogram_version }}
        shell: bash
        run: |
          set -euo pipefail
          d3="${D3_INPUT:-$(npm view d3 version)}"
          ideogram="${IDEOGRAM_INPUT:-$(npm view ideogram version)}"
          semver='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'
          [[ "$d3" =~ $semver ]] || { echo "Invalid D3 version: $d3" >&2; exit 1; }
          [[ "$ideogram" =~ $semver ]] || { echo "Invalid Ideogram version: $ideogram" >&2; exit 1; }
          echo "d3=$d3" >> "$GITHUB_OUTPUT"
          echo "ideogram=$ideogram" >> "$GITHUB_OUTPUT"

      - name: Vendor pinned npm assets
        run: >-
          Rscript scripts/vendor-visual-dependencies.R
          --d3-version "${{ steps.versions.outputs.d3 }}"
          --ideogram-version "${{ steps.versions.outputs.ideogram }}"

      - name: Regenerate documentation and test
        run: |
          Rscript -e 'devtools::document()'
          Rscript -e 'testthat::test_local()'

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          D3_VERSION: ${{ steps.versions.outputs.d3 }}
          IDEOGRAM_VERSION: ${{ steps.versions.outputs.ideogram }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && [[ -z "$(git status --short)" ]]; then
            echo "Vendored visual dependencies are current."
            exit 0
          fi
          branch="vendor/visual-dependencies"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"
          git add -A
          git commit -m "Vendor D3 $D3_VERSION and Ideogram $IDEOGRAM_VERSION"
          git fetch origin "$branch:refs/remotes/origin/$branch" || true
          git push --force-with-lease origin "$branch"
          title="Vendor D3 $D3_VERSION and Ideogram $IDEOGRAM_VERSION"
          body="Refreshes pinned browser assets, licenses, source metadata, documentation, and tests from the published npm tarballs."
          if gh pr view "$branch" --json number >/dev/null 2>&1; then
            gh pr edit "$branch" --title "$title" --body "$body"
          else
            gh pr create --title "$title" --body "$body" --base "${{ github.event.repository.default_branch }}" --head "$branch"
          fi
