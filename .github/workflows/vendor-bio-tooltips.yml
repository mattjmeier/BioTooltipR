name: Vendor bio-tooltips assets

on:
  workflow_dispatch:
    inputs:
      version:
        description: bio-tooltips npm version to vendor
        required: true
        type: string
  repository_dispatch:
    types: [bio-tooltips-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  vendor:
    name: Vendor npm assets
    runs-on: ubuntu-latest

    steps:
      - name: Resolve version
        id: version
        env:
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          version="${INPUT_VERSION:-$DISPATCH_VERSION}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+){0,2}$ ]]; then
            echo "Invalid bio-tooltips version: $version" >&2
            exit 1
          fi
          branch_version="${version//+/-}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "branch=vendor/bio-tooltips-$branch_version" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          registry-url: https://registry.npmjs.org

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::devtools
            any::testthat
          needs: check

      - name: Vendor bio-tooltips assets
        run: Rscript scripts/vendor-bio-tooltips.R --npm-version "${{ steps.version.outputs.version }}"

      - name: Regenerate documentation
        run: Rscript -e 'devtools::document()'

      - name: Run tests
        run: Rscript -e 'testthat::test_local()'

      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.version.outputs.branch }}
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet && [[ -z "$(git status --short)" ]]; then
            echo "No vendored asset changes for bio-tooltips $VERSION."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add -A
          git commit -m "Vendor bio-tooltips $VERSION"
          git fetch origin "$BRANCH:refs/remotes/origin/$BRANCH" || true
          git push --force-with-lease origin "$BRANCH"

          body="Updates the vendored Bio Tooltips browser assets to \`bio-tooltips@$VERSION\`.

          This PR was generated by the vendoring workflow after fetching the published npm tarball with \`npm pack\`.

          Checks run:
          - \`devtools::document()\`
          - \`testthat::test_local()\`"

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            gh pr edit "$BRANCH" \
              --title "Vendor bio-tooltips $VERSION" \
              --body "$body"
          else
            gh pr create \
              --title "Vendor bio-tooltips $VERSION" \
              --body "$body" \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$BRANCH"
          fi
